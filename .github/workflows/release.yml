name: Release

on:
  push:
    branches: [main]

jobs:
  # Publishes when a release PR (maintained by release-pr.yml) merges.
  # The version bump lands on main through that PR like any other
  # change, so nothing here pushes to main and the branch ruleset
  # stays intact. Requires squash-merging the release PR: the guard
  # matches the squashed commit title.
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'release: v')
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      # No typecheck/test here: the release PR passed the required
      # checks to merge. bun install is for prepublishOnly's build.
      - run: bun install --frozen-lockfile

      # npm, not bun: bun publish doesn't support npm trusted publishing
      # (OIDC), see oven-sh/bun#22423. Trusted publishing needs npm >= 11.5.1,
      # hence npx (a global upgrade hits EACCES on /usr/local).
      - name: Publish to npm
        run: npx -y npm@latest publish --access public --provenance

      - name: Create GitHub release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(jq -r .version package.json)
          gh release create "v$version" --target "$GITHUB_SHA" --generate-notes
